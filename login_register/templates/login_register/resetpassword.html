<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESET PASSWORD</title>
    <!-- bootstrap and css -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'login_register/css/bootstrap.min.css' %}">
</head>
<body>
    <div class="container">
        <div class="row d-flex justify-content-center">
            <div class="col-6 bg-light shadow-lg p-3 mb-5 bg-white rounded border border-5 border-end-0 border-bottom-0 border-start-0 border-warning">
                <!-- title -->
                <form action="{% url 'resetpassword' %}" method="post">
                {% csrf_token %}
                <h1 class="text-center mb-5"> RESET PASSWORD </h1>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                
                    <label for="old_password">Old Password:</label>
                    <input type="password" id="old_password" name="old_password" required>
                    <br><br>
                    <label for="new_password">New Password:</label>
                    <input type="password" id="new_password" name="new_password" required>
                    <br><br>
                    <label for="confirm_password">Confirm Password:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                    <br><br>
                    <button type="submit" class="btn btn-warning">Reset Password</button>
                    <br><br>
                    <a href="{% url 'home' %}">
                        <button type="button" class="btn btn-danger">Home</button>
                    </a>
                </form>

            </div>
        </div>
    </div>

    
</body>
</html>
